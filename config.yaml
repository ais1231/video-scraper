# Video Scraper 配置
# 按需修改以下配置项

# 下载目录（留空默认使用 output_template 的相对路径）
# 设置后所有视频会下载到此目录下，按站点分文件夹
# 示例:  download_dir: "E:\我的视频"
download_dir: ""

# 下载输出路径（当 download_dir 为空时生效，支持 yt-dlp 输出模板变量）
output_template: "downloads/%(extractor)s/%(title)s.%(ext)s"

# ffmpeg 路径（留空则从 PATH 自动寻找，一般不需要改）
ffmpeg_location: ""

# Cookie 文件（已通过 export_cookies.py 导出，夸克开着时也有效）
# 如果 Cookie 过期，重新运行: python export_cookies.py
cookies_file: "cookies.txt"

# 自动从浏览器提取 Cookie（备选，需要关掉浏览器才能用）
cookies_from_browser: ""

# 代理设置（可选，如 http://127.0.0.1:7890）
proxy: ""

# 下载并发数
concurrent_fragments: 5

# 重试次数
retries: 10
