# Video Scraper 配置
# 按需修改以下配置项

# 下载目录（留空默认使用 output_template 的相对路径）
# 设置后所有视频会下载到此目录下，按站点分文件夹
# 示例:  download_dir: "E:\我的视频"
download_dir: ""

# 下载输出路径（当 download_dir 为空时生效，支持 yt-dlp 输出模板变量）
output_template: "downloads/%(extractor)s/%(title)s.%(ext)s"

# ffmpeg 路径（留空则从 PATH 自动寻找）
ffmpeg_location: "C:\\Users\\csh\\AppData\\Local\\Microsoft\\WinGet\\Packages\\Gyan.FFmpeg.Essentials_Microsoft.Winget.Source_8wekyb3d8bbwe\\ffmpeg-8.1.1-essentials_build\\bin\\ffmpeg.exe"

# Cookie 文件路径（可选，用于访问需要登录的站点的视频）
# 可从浏览器导出 Netscape 格式的 cookie 文件
cookies_file: ""

# 自动从浏览器提取 Cookie（优先于 cookies_file）
# 可选值: chrome, chromium, brave, firefox, edge, opera, safari, 或留空禁用
# 用 :: 指定浏览器数据目录路径
# 下 Twitter/Bilibili 前先关掉夸克浏览器，再取消注释下面这行:
# cookies_from_browser: "chrome::C:\\Users\\csh\\AppData\\Local\\Quark\\User Data"

# 代理设置（可选，如 http://127.0.0.1:7890）
proxy: ""

# 下载并发数
concurrent_fragments: 1

# 重试次数
retries: 10
